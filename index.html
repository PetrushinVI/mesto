<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Место</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body class="body">
  <div class="page">
    <header class="header">
      <img src="./images/Vector.svg" alt="Логотип" class="header__logo">
    </header>
    <main>
      <section class="profile">
        <div class="profile__avatar"></div>
        <div class="info">
          <p class="info__name">Жак-Ив Кусто</p>
          <div class="info__btn"></div>
          <p class="info__description">Исследователь океана</p>
        </div>
        <div class="profile__add-btn"></div>
      </section>
      <section class="elements">
        <div class="element">
          <img src="./images/kirill-pershin-1088404-unsplash.jpg" alt="Карачаевск" class="element__picture">
          <div class="description">
            <p class="description__text">Карачаевск</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
        <div class="element">
          <img src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Эльбрус" class="element__picture">
          <div class="description">
            <p class="description__text">Гора Эльбрус</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
        <div class="element">
          <img src="./images/kirill-pershin-1556355-unsplash.jpg" alt="Домбай" class="element__picture">
          <div class="description">
            <p class="description__text">Домбай</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
        <div class="element">
          <img src="./images/kirill-pershin-1404681-unsplash.jpg" alt="Эльбрус" class="element__picture">
          <div class="description">
            <p class="description__text">Гора Эльбрус</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
        <div class="element">
          <img src="./images/kirill-pershin-1556355-unsplash.jpg" alt="Домбай" class="element__picture">
          <div class="description">
            <p class="description__text">Домбай</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
        <div class="element">
          <img src="./images/kirill-pershin-1088404-unsplash.jpg" alt="Карачаевск" class="element__picture">
          <div class="description">
            <p class="description__text">Карачаевск</p>
            <img src="./images/heart.png" alt="Лайк" class="description__btn">
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">© 2022 Mesto Russia</footer>
    <div class="popup">
      <div class="popup__container">
        <form action="" class="form">
          <img src="./images/CloseIcon2.svg" alt="Кнопка закрытия" class="form__close">
          <h2 class="form__title">Редактировать профиль</h2>
          <input type="text" placeholder="Жак-Ив Кусто" value="Жак-Ив Кусто" class="form__input nameInput">
          <input type="text" placeholder="Исследователь океана" value="Исследователь океана" class="form__input jobInput">
          <input type="submit" value="Сохранить" class="form__btn">
        </form>
      </div>
    </div>
  </div>
  <script src="scripts/index.js"></script>
</body>
</html>
